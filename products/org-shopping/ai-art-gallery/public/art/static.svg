<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="#e7e2d9"/>
  <rect width="800" height="600" fill="#c4b8a8" filter="url(#noise)" opacity="0.35"/>
  <circle cx="400" cy="300" r="180" fill="none" stroke="#0c0c0f" stroke-width="2" opacity="0.08"/>
</svg>
