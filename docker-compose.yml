services:
  # ── Reverse Proxy ─────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    mem_limit: 64m

  # ── RamblingRadio ─────────────────────────────────────────────
  ramblingradio:
    image: 216labs/ramblingradio:latest
    build: ./apps/RamblingRadio
    restart: unless-stopped
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/ramblingradio.db
    volumes:
      - ./apps/RamblingRadio/data:/app/data
    expose:
      - "5000"
    mem_limit: 256m

  # ── Stroll.live ───────────────────────────────────────────────
  stroll:
    image: 216labs/stroll:latest
    build: ./apps/Stroll.live
    restart: unless-stopped
    environment:
      - PORT=5000
      - NODE_ENV=production
    expose:
      - "5000"
    mem_limit: 256m

  # ── OneRoom ───────────────────────────────────────────────────
  oneroom:
    image: 216labs/oneroom:latest
    build: ./apps/oneroom
    restart: unless-stopped
    environment:
      - PORT=3000
      - NODE_ENV=production
      - LLM_PROVIDER=${ONEROOM_LLM_PROVIDER:-openai}
      - OPENAI_API_KEY=${ONEROOM_OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${ONEROOM_GEMINI_API_KEY:-}
    expose:
      - "3000"
    mem_limit: 256m

  # ── OneFit ────────────────────────────────────────────────────
  onefit:
    image: 216labs/onefit:latest
    build: ./apps/onefit
    restart: unless-stopped
    environment:
      - PORT=3000
      - NODE_ENV=production
      - LLM_PROVIDER=${ONEFIT_LLM_PROVIDER:-openai}
      - OPENAI_API_KEY=${ONEFIT_OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${ONEFIT_GEMINI_API_KEY:-}
    expose:
      - "3000"
    mem_limit: 256m

  # ── HiveFind ─────────────────────────────────────────────────
  hivefind:
    image: 216labs/hivefind:latest
    build: ./apps/hivefind
    restart: unless-stopped
    environment:
      - PORT=3000
      - NODE_ENV=production
    expose:
      - "3000"
    mem_limit: 256m

  # ── PipeSecure ───────────────────────────────────────────────
  pipesecure:
    image: 216labs/pipesecure:latest
    build: ./pipesecure
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/data
      - GITHUB_TOKEN=${PIPESECURE_GITHUB_TOKEN:-}
      - GITHUB_REPO=${PIPESECURE_GITHUB_REPO:-6cubed/216labs}
      - SCAN_INTERVAL_HOURS=${PIPESECURE_SCAN_INTERVAL_HOURS:-24}
      - PORT=3000
    volumes:
      - ./pipesecure/data:/app/data
    expose:
      - "3000"
    mem_limit: 512m

  # ── Happy Path (clickthrough tests) ──────────────────────────
  happypath:
    image: 216labs/happypath:latest
    build: ./happypath
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/data
      - DATABASE_PATH=/app/216labs.db
      - APP_HOST=${APP_HOST:-6cubed.app}
      - TEST_INTERVAL_HOURS=${HAPPYPATH_TEST_INTERVAL_HOURS:-6}
      - PORT=3000
    volumes:
      - ./216labs.db:/app/216labs.db:ro
      - ./happypath/data:/app/data
    expose:
      - "3000"
    mem_limit: 512m

  # ── 216labs Admin Dashboard ─────────────────────────────────
  admin:
    image: 216labs/admin:latest
    build: ./216labs_admin
    restart: unless-stopped
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DATABASE_PATH=/app/216labs.db
      - PROJECTS_ROOT=/workspace
      - NEXT_PUBLIC_APP_HOST=${APP_HOST:-6cubed.app}
      - STORYBOOK_INTERNAL_URL=${STORYBOOK_INTERNAL_URL:-http://storybook:3000}
      - STORYBOOK_ADMIN_TOKEN=${STORYBOOK_ADMIN_TOKEN:-}
    volumes:
      - ./216labs.db:/app/216labs.db
      - ./:/workspace:ro
      - /var/run/docker.sock:/var/run/docker.sock
    expose:
      - "3000"
    mem_limit: 256m

  # ── AGI Memes ────────────────────────────────────────────────
  agimemes:
    image: 216labs/agimemes:latest
    build: ./apps/agimemes.com
    restart: unless-stopped
    environment:
      - PORT=5000
      - NEWS_API_KEY=${AGIMEMES_NEWS_API_KEY:-}
      - IMG_FLIP_USERNAME=${AGIMEMES_IMG_FLIP_USERNAME:-}
      - IMG_FLIP_PASSWORD=${AGIMEMES_IMG_FLIP_PASSWORD:-}
    expose:
      - "5000"
    mem_limit: 128m

  # ── Priors ───────────────────────────────────────────────────
  priors:
    image: 216labs/priors:latest
    build: ./apps/priors
    restart: unless-stopped
    environment:
      - PORT=5000
      - PRIORS_DATABASE_PATH=/app/data/database.db
      - PRIORS_SECRET_KEY=${PRIORS_SECRET_KEY:-change-me}
      - PRIORS_GOOGLE_CLIENT_SECRETS_FILE=/app/client_secret.json
      - PRIORS_OAUTH_REDIRECT_URI=${PRIORS_OAUTH_REDIRECT_URI:-https://priors.6cubed.app/callback}
      - GOOGLE_CLIENT_ID=${PRIORS_GOOGLE_CLIENT_ID:-}
      - GEMINI_API_KEY=${PRIORS_GEMINI_API_KEY:-}
    volumes:
      - ./apps/priors/data:/app/data
      - ./apps/priors/client_secret.json:/app/client_secret.json:ro
    expose:
      - "5000"
    mem_limit: 128m

  # ── Big Leroy's Premier League Guessing Bonanza ──────────────
  bigleroys:
    image: 216labs/bigleroys:latest
    build: ./apps/bigleroys
    restart: unless-stopped
    environment:
      - PORT=5000
      - BIGLEROYS_SECRET_KEY=${BIGLEROYS_SECRET_KEY:-change-me}
      - BIGLEROYS_GOOGLE_CLIENT_SECRETS_FILE=/app/client_secret.json
      - BIGLEROYS_OAUTH_REDIRECT_URI=${BIGLEROYS_OAUTH_REDIRECT_URI:-https://bigleroys.6cubed.app/callback}
      - BIGLEROYS_GOOGLE_CLIENT_ID=${BIGLEROYS_GOOGLE_CLIENT_ID:-}
      - BIGLEROYS_DATABASE_PATH=/app/data/bigleroys.db
    volumes:
      - ./apps/bigleroys/data:/app/data
      - ./apps/bigleroys/client_secret.json:/app/client_secret.json:ro
    expose:
      - "5000"
    mem_limit: 128m

  # ── AgitShirts ────────────────────────────────────────────────
  agitshirts:
    image: 216labs/agitshirts:latest
    build: ./apps/agitshirts
    restart: unless-stopped
    environment:
      - PORT=5000
      - AGITSHIRTS_OPENAI_API_KEY=${AGITSHIRTS_OPENAI_API_KEY:-}
      - AGITSHIRTS_MODEL=${AGITSHIRTS_MODEL:-gpt-4o-mini}
      - AGITSHIRTS_CHECKOUT_BASE_URL=${AGITSHIRTS_CHECKOUT_BASE_URL:-}
    expose:
      - "5000"
    mem_limit: 128m

  # ── Artisanal Europe ─────────────────────────────────────────
  artisinaleurope:
    image: 216labs/artisinaleurope:latest
    build: ./apps/artisinaleurope
    restart: unless-stopped
    environment:
      - PORT=3000
      - NODE_ENV=production
    expose:
      - "3000"
    mem_limit: 256m

  # ── CalibratedAI ─────────────────────────────────────────────
  calibratedai:
    image: 216labs/calibratedai:latest
    build: ./apps/calibratedai
    restart: unless-stopped
    environment:
      - PORT=3000
      - NODE_ENV=production
      - CALIBRATEDAI_OPENROUTER_API_KEY=${CALIBRATEDAI_OPENROUTER_API_KEY:-}
      - CALIBRATEDAI_DB_PATH=/app/data/calibratedai.db
    volumes:
      - ./apps/calibratedai/data:/app/data
    expose:
      - "3000"
    mem_limit: 256m

  # ── 1PageResearch ────────────────────────────────────────────
  1pageresearch:
    image: 216labs/1pageresearch:latest
    build: ./apps/1pageresearch
    restart: unless-stopped
    environment:
      - PORT=5000
      - ONEPAGE_OPENROUTER_API_KEY=${ONEPAGE_OPENROUTER_API_KEY:-}
      - ONEPAGE_MODEL=${ONEPAGE_MODEL:-google/gemini-2.0-flash-001}
      - ONEPAGE_DB_PATH=/app/data/1pageresearch.db
    volumes:
      - ./apps/1pageresearch/data:/app/data
    expose:
      - "5000"
    mem_limit: 128m

  # ── The Zurich Dating Game ───────────────────────────────────
  thezurichdatinggame:
    image: 216labs/thezurichdatinggame:latest
    build: ./apps/thezurichdatinggame
    restart: unless-stopped
    environment:
      - PORT=3000
      - NODE_ENV=production
      - ZDGAME_DB_PATH=/app/data/zdgame.db
      - ZDGAME_ADMIN_KEY=${ZDGAME_ADMIN_KEY:-change-me}
      - ZDGAME_OPENROUTER_API_KEY=${ZDGAME_OPENROUTER_API_KEY:-}
      - ZDGAME_MODEL=${ZDGAME_MODEL:-google/gemini-2.0-flash-001}
    volumes:
      - ./apps/thezurichdatinggame/data:/app/data
    expose:
      - "3000"
    mem_limit: 256m

  # ── StoryMagic ───────────────────────────────────────────────
  storybook:
    image: 216labs/storybook:latest
    build: ./apps/storybook
    restart: unless-stopped
    environment:
      - PORT=3000
      - NODE_ENV=production
      - STORYBOOK_OPENAI_API_KEY=${STORYBOOK_OPENAI_API_KEY:-}
      - STORYBOOK_STRIPE_SECRET_KEY=${STORYBOOK_STRIPE_SECRET_KEY:-}
      - STORYBOOK_STRIPE_WEBHOOK_SECRET=${STORYBOOK_STRIPE_WEBHOOK_SECRET:-}
      - NEXT_PUBLIC_STORYBOOK_STRIPE_PUBLISHABLE_KEY=${NEXT_PUBLIC_STORYBOOK_STRIPE_PUBLISHABLE_KEY:-}
      - STORYBOOK_BOOK_PRICE_CENTS=${STORYBOOK_BOOK_PRICE_CENTS:-2499}
      - STORYBOOK_ADMIN_TOKEN=${STORYBOOK_ADMIN_TOKEN:-}
      - STORYBOOK_RESEND_API_KEY=${STORYBOOK_RESEND_API_KEY:-}
      - STORYBOOK_ADMIN_EMAIL=${STORYBOOK_ADMIN_EMAIL:-}
      - STORYBOOK_FROM_EMAIL=${STORYBOOK_FROM_EMAIL:-}
      - DATA_DIR=/app/data
    volumes:
      - ./apps/storybook/data:/app/data
    expose:
      - "3000"
    mem_limit: 256m

  # ── OfflineLLM ───────────────────────────────────────────────────
  offlinellm:
    image: 216labs/offlinellm:latest
    build: ./apps/offlinellm
    restart: unless-stopped
    environment:
      - PORT=3000
      - NODE_ENV=production
    expose:
      - "3000"
    mem_limit: 256m

  # ── Pocket ───────────────────────────────────────────────────────
  pocket:
    image: 216labs/pocket:latest
    build: ./apps/pocket
    restart: unless-stopped
    environment:
      - PORT=3000
      - NODE_ENV=production
    expose:
      - "3000"
    mem_limit: 256m

  # ── Blog ──────────────────────────────────────────────────────
  blog:
    image: 216labs/blog:latest
    build: ./apps/blog
    restart: unless-stopped
    environment:
      - PORT=3000
      - NODE_ENV=production
    expose:
      - "3000"
    mem_limit: 256m

  # ── World Photo ─────────────────────────────────────────────
  worldphoto:
    image: 216labs/worldphoto:latest
    build: ./apps/worldphoto
    restart: unless-stopped
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DATA_DIR=/app/data
    volumes:
      - ./apps/worldphoto/data:/app/data
    expose:
      - "3000"
    mem_limit: 256m

  # ── 216labs Landing (6cubed.app + www) ──────────────────────────
  landing:
    image: 216labs/landing:latest
    build: ./apps/landing
    restart: unless-stopped
    environment:
      - PORT=5000
    expose:
      - "5000"
    mem_limit: 64m

  # ── FaceRate ──────────────────────────────────────────────────
  facerate:
    image: 216labs/facerate:latest
    build: ./apps/facerate
    restart: unless-stopped
    environment:
      - PORT=5000
      - FACERATE_DB_PATH=/app/data/facerate.db
      - FACERATE_FACES_DIR=/app/static/faces
    volumes:
      - ./apps/facerate/data:/app/data
      - ./apps/facerate/static/faces:/app/static/faces
    expose:
      - "5000"
    mem_limit: 256m

  # ── CrowdBulk ─────────────────────────────────────────────────
  crowdbulk:
    image: 216labs/crowdbulk:latest
    build: ./apps/crowdbulk
    restart: unless-stopped
    environment:
      - PORT=3000
      - NODE_ENV=production
      - CROWDBULK_DB_PATH=/app/data/crowdbulk.db
      - CROWDBULK_BASE_URL=https://crowdbulk.6cubed.app
    volumes:
      - ./apps/crowdbulk/data:/app/data
    expose:
      - "3000"
    mem_limit: 512m

  # ── Audio AI Checkup ─────────────────────────────────────────
  audioaicheckup:
    image: 216labs/audioaicheckup:latest
    build: ./apps/audioaicheckup
    restart: unless-stopped
    environment:
      - PORT=3000
      - NODE_ENV=production
      - AUDIOAICHECKUP_OPENAI_API_KEY=${AUDIOAICHECKUP_OPENAI_API_KEY:-}
      - AUDIOAICHECKUP_GEMINI_API_KEY=${AUDIOAICHECKUP_GEMINI_API_KEY:-}
      - DATA_DIR=/app/data
    volumes:
      - ./apps/audioaicheckup/data:/app/data
    expose:
      - "3000"
    mem_limit: 512m


  # ── Anchor ───────────────────────────────────────────────────
  anchor-api:
    image: 216labs/anchor-api:latest
    build: ./apps/anchor/backend
    restart: unless-stopped
    environment:
      - ANCHOR_DATABASE_URL=sqlite+aiosqlite:///./data/anchor.db
      - ANCHOR_SECRET_KEY=${ANCHOR_SECRET_KEY:-change-me}
    volumes:
      - ./apps/anchor/data:/app/data
    expose:
      - "8000"
    mem_limit: 256m

  anchor-web:
    image: 216labs/anchor-web:latest
    build: ./apps/anchor/frontend
    restart: unless-stopped
    expose:
      - "80"
    mem_limit: 64m

  # ── Múinteoir ─────────────────────────────────────────────────
  muinteoir:
    image: 216labs/muinteoir:latest
    build: ./apps/muinteoir
    restart: unless-stopped
    environment:
      - PORT=3000
      - NODE_ENV=production
    volumes:
      - ./apps/muinteoir/data:/app/data
    expose:
      - "3000"
    mem_limit: 256m

volumes:
  caddy_data:
  caddy_config:
