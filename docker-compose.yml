services:
  # ── Reverse Proxy ─────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
    # Some older deploys stored ADMIN_PASSWORD_HASH using bcrypt's base64 alphabet
    # where '.' should be '+' for standard base64 decoding.
    # Fix it at runtime so caddy can always start, regardless of how the hash was generated.
    command: sh -c "if [ -n \"\$ADMIN_PASSWORD_HASH\" ]; then case \"\$ADMIN_PASSWORD_HASH\" in *\\$*) export ADMIN_PASSWORD_HASH=\"\$(printf %s \"\$ADMIN_PASSWORD_HASH\" | base64 | tr -d '\n')\" ;; *) export ADMIN_PASSWORD_HASH=\"\$(echo \"\$ADMIN_PASSWORD_HASH\" | tr . +)\" ;; esac; fi; exec caddy run --config /etc/caddy/Caddyfile"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    mem_limit: 64m

  # ── Activator (on-demand docker compose up for cold apps) ─────
  activator:
    image: 216labs/activator:latest
    pull_policy: never
    build: ./internal/platform/activator
    restart: unless-stopped
    environment:
      - PORT=3040
      - APP_HOST=${APP_HOST:-6cubed.app}
      # Match deploy's project name (/opt/216labs → 216labs). Default compose name from /workspace would be "workspace" and cold-starts would create duplicate containers on the wrong network.
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME:-216labs}
      - ACTIVATOR_PROJECT_ROOT=/workspace
      - ACTIVATOR_DB_PATH=/app/216labs.db
      - ACTIVATOR_START_TIMEOUT_SECONDS=120
      - ACTIVATOR_REGISTRY_PREFIX=${ACTIVATOR_REGISTRY_PREFIX:-ghcr.io/6cubed/216labs}
      - GHCR_TOKEN=${GHCR_TOKEN:-}
      - GHCR_USERNAME=${GHCR_USERNAME:-token}
      # LRU pool: 0 = off (default; safe when hopping across many subdomains). Set e.g. 10 in .env on tight RAM.
      - ACTIVATOR_MAX_CONCURRENT_APPS=${ACTIVATOR_MAX_CONCURRENT_APPS:-0}
      - ACTIVATOR_REAPER_INTERVAL_SECONDS=${ACTIVATOR_REAPER_INTERVAL_SECONDS:-120}
      - ACTIVATOR_PROTECTED_SERVICES=${ACTIVATOR_PROTECTED_SERVICES:-caddy,activator,admin,landing,bugbounty,hello-nextjs,hello-flask}
      # Compose services that refuse /api/start (avoid restarting edge or self).
      - ACTIVATOR_BLOCK_START_SERVICES=${ACTIVATOR_BLOCK_START_SERVICES:-caddy,activator}
      # Optional: delete 216labs/<svc>:latest on eviction to free disk (reload image via deploy).
      - ACTIVATOR_REMOVE_IMAGE_ON_EVICT=${ACTIVATOR_REMOVE_IMAGE_ON_EVICT:-false}
      # true only if you host 216labs/* in a registry (default: do not docker pull).
      - ACTIVATOR_TRY_DOCKER_PULL=${ACTIVATOR_TRY_DOCKER_PULL:-false}
    volumes:
      - ./216labs.db:/app/216labs.db
      - ./:/workspace:ro
      - /var/run/docker.sock:/var/run/docker.sock
    expose:
      - "3040"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3040/healthz', timeout=4)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    mem_limit: 128m

  # ── RamblingRadio ─────────────────────────────────────────────
  ramblingradio:
    image: 216labs/ramblingradio:latest
    pull_policy: never
