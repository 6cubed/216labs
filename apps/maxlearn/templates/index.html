<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>MaxLearn — Tinder for Wikipedia rabbit holes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c0f;
      --surface: #141419;
      --card: #1a1a22;
      --border: #2a2a36;
      --like: #22c55e;
      --skip: #ef4444;
      --link: #60a5fa;
      --text: #e4e4e7;
      --muted: #71717a;
      --radius: 20px;
      --font: "DM Sans", -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
      padding-bottom: calc(1rem + env(safe-area-inset-bottom));
    }

    header {
      text-align: center;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #93c5fd 0%, #60a5fa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 0.25rem;
    }

    .card-wrap {
      width: 100%;
      max-width: 420px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 320px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem 1.5rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      touch-action: pan-y;
      user-select: none;
    }

    .card.swiping-left {
      transform: translateX(-120%) rotate(-12deg);
      opacity: 0.6;
    }

    .card.swiping-right {
      transform: translateX(120%) rotate(12deg);
      opacity: 0.6;
    }

    .card .title {
      font-size: 1.35rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 0.75rem;
      color: #f4f4f5;
    }

    .card .extract {
      font-size: 1rem;
      line-height: 1.6;
      color: var(--text);
      margin-bottom: 1rem;
    }

    .card a.wiki-link {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      color: var(--link);
      font-size: 0.9rem;
      font-weight: 500;
      text-decoration: none;
      padding: 0.4rem 0;
    }

    .card a.wiki-link:hover {
      text-decoration: underline;
    }

    .card a.wiki-link::after {
      content: "→";
    }

    .state-empty, .state-loading, .state-error {
      text-align: center;
      padding: 2rem 1.5rem;
      color: var(--muted);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .state-empty h2, .state-error h2 {
      color: var(--text);
      font-size: 1.2rem;
      margin-bottom: 0.5rem;
    }

    .state-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--link);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-top: 1.5rem;
      padding: 0.5rem;
    }

    .btn-action {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-action:active {
      transform: scale(0.92);
    }

    .btn-skip {
      background: var(--surface);
      border: 2px solid var(--border);
      color: var(--skip);
    }

    .btn-skip:hover {
      background: rgba(239, 68, 68, 0.15);
      border-color: var(--skip);
    }

    .btn-like {
      background: rgba(34, 197, 94, 0.2);
      border: 2px solid var(--like);
      color: var(--like);
    }

    .btn-like:hover {
      background: rgba(34, 197, 94, 0.3);
      box-shadow: 0 0 24px rgba(34, 197, 94, 0.25);
    }

    .btn-action svg {
      width: 28px;
      height: 28px;
    }

    .hidden { display: none !important; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <header>
    <h1>MaxLearn</h1>
    <p class="tagline">Swipe into Wikipedia rabbit holes. Like one — we add 10 more like it.</p>
  </header>

  <main class="card-wrap">
    <div id="state-loading" class="state-loading">
      <div class="spinner"></div>
      <span>Loading your next rabbit hole…</span>
    </div>

    <div id="state-empty" class="state-empty hidden">
      <h2>You’re all caught up</h2>
      <p>Like some articles to grow your feed with 10 related snippets each. Come back later for more.</p>
    </div>

    <div id="state-error" class="state-error hidden">
      <h2>Something went wrong</h2>
      <p id="error-message">Try refreshing the page.</p>
    </div>

    <div id="card-container" class="hidden">
      <div id="card" class="card" data-snippet-id="">
        <h2 class="title" id="card-title"></h2>
        <p class="extract" id="card-extract"></p>
        <a id="card-link" class="wiki-link" href="#" target="_blank" rel="noopener">Read on Wikipedia</a>
      </div>
    </div>
  </main>

  <div id="actions" class="actions hidden">
    <button type="button" class="btn-action btn-skip" id="btn-skip" title="Skip" aria-label="Skip">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
    <button type="button" class="btn-action btn-like" id="btn-like" title="Like — add 10 related" aria-label="Like">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
      </svg>
    </button>
  </div>

  <script>
    (function() {
      const cardContainer = document.getElementById('card-container');
      const card = document.getElementById('card');
      const cardTitle = document.getElementById('card-title');
      const cardExtract = document.getElementById('card-extract');
      const cardLink = document.getElementById('card-link');
      const stateLoading = document.getElementById('state-loading');
      const stateEmpty = document.getElementById('state-empty');
      const stateError = document.getElementById('state-error');
      const errorMessage = document.getElementById('error-message');
      const actions = document.getElementById('actions');
      const btnSkip = document.getElementById('btn-skip');
      const btnLike = document.getElementById('btn-like');

      function showState(id) {
        stateLoading.classList.toggle('hidden', id !== 'state-loading');
        stateEmpty.classList.toggle('hidden', id !== 'state-empty');
        stateError.classList.toggle('hidden', id !== 'state-error');
        cardContainer.classList.toggle('hidden', id !== 'card-container');
        actions.classList.toggle('hidden', id !== 'card-container');
      }

      function setCard(snippet) {
        card.dataset.snippetId = snippet.id;
        cardTitle.textContent = snippet.title;
        cardExtract.textContent = snippet.extract;
        cardLink.href = snippet.wiki_url;
        card.classList.remove('swiping-left', 'swiping-right');
      }

      function fetchNext() {
        showState('state-loading');
        fetch('/api/next')
          .then(function(r) { return r.json(); })
          .then(function(data) {
            if (data.snippet) {
              setCard(data.snippet);
              showState('card-container');
            } else {
              showState('state-empty');
            }
          })
          .catch(function(err) {
            errorMessage.textContent = err.message || 'Try refreshing.';
            showState('state-error');
          });
      }

      function sendAction(snippetId, endpoint) {
        return fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ snippet_id: snippetId })
        }).then(function(r) {
          if (!r.ok) throw new Error('Request failed');
          return r.json();
        });
      }

      function like() {
        const sid = card.dataset.snippetId;
        if (!sid) return;
        card.classList.add('swiping-right');
        btnLike.disabled = true;
        btnSkip.disabled = true;
        sendAction(sid, '/api/like').then(function() {
          setTimeout(fetchNext, 280);
        }).catch(function() {
          btnLike.disabled = false;
          btnSkip.disabled = false;
          card.classList.remove('swiping-right');
        });
      }

      function skip() {
        const sid = card.dataset.snippetId;
        if (!sid) return;
        card.classList.add('swiping-left');
        btnLike.disabled = true;
        btnSkip.disabled = true;
        sendAction(sid, '/api/skip').then(function() {
          setTimeout(fetchNext, 280);
        }).catch(function() {
          btnLike.disabled = false;
          btnSkip.disabled = false;
          card.classList.remove('swiping-left');
        });
      }

      btnLike.addEventListener('click', like);
      btnSkip.addEventListener('click', skip);

      // Touch swipe
      var touchStartX = 0, touchStartY = 0;
      card.addEventListener('touchstart', function(e) {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
      }, { passive: true });
      card.addEventListener('touchmove', function(e) {
        var dx = e.touches[0].clientX - touchStartX;
        var dy = e.touches[0].clientY - touchStartY;
        if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 30) {
          card.classList.toggle('swiping-left', dx < 0);
          card.classList.toggle('swiping-right', dx > 0);
        }
      }, { passive: true });
      card.addEventListener('touchend', function(e) {
        var dx = e.changedTouches[0].clientX - touchStartX;
        if (dx > 80) like();
        else if (dx < -80) skip();
        card.classList.remove('swiping-left', 'swiping-right');
      });

      // Mouse drag for desktop
      var mouseDown = false, mouseStartX = 0;
      card.addEventListener('mousedown', function(e) {
        mouseDown = true;
        mouseStartX = e.clientX;
      });
      document.addEventListener('mousemove', function(e) {
        if (!mouseDown || !card.dataset.snippetId) return;
        var dx = e.clientX - mouseStartX;
        if (Math.abs(dx) > 30) {
          card.classList.toggle('swiping-left', dx < 0);
          card.classList.toggle('swiping-right', dx > 0);
        }
      });
      document.addEventListener('mouseup', function(e) {
        if (!mouseDown) return;
        mouseDown = false;
        var dx = e.clientX - mouseStartX;
        if (dx > 80) like();
        else if (dx < -80) skip();
        card.classList.remove('swiping-left', 'swiping-right');
      });

      fetchNext();
    })();
  </script>
</body>
</html>
