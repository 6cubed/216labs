name: activator-ci
on:
  push:
    paths:
      - "apps/activator/**"
      - ".github/workflows/activator-ci.yml"
  pull_request:
    paths:
      - "apps/activator/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r apps/activator/requirements.txt
      - name: Unit tests
        run: python -m unittest discover -s apps/activator/tests -p "test_*.py" -v
