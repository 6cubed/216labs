# Frame & Flux (aiart) is easy to miss in the monorepo GHCR matrix; publish it explicitly here.
name: Publish aiart to GHCR

on:
  push:
    branches: [main]
    paths:
      - "products/org-shopping/ai-art-gallery/**"
      - ".github/workflows/ghcr-publish-aiart.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY_PREFIX: ghcr.io/6cubed/216labs

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure compose env files
        run: |
          test -f .env || cp .env.example .env
          touch .env.admin
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push aiart
        run: |
          set -euo pipefail
          docker compose --env-file .env --env-file .env.admin build \
            --build-arg CACHEBUST="${GITHUB_SHA}" \
            aiart
          docker tag 216labs/aiart:latest "${REGISTRY_PREFIX}/aiart:latest"
          docker push "${REGISTRY_PREFIX}/aiart:latest"
